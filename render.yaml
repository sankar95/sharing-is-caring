services:
  - type: web
    name: sharing-is-caring
    env: node
    region: singapore   # change to: ohio, oregon, frankfurt, or singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/listings.db
    disk:
      name: db
      mountPath: /var/data
      sizeGB: 1
